sealed-secrets:
  image:
    registry: docker.io
    repository: bitnamilegacy/sealed-secrets-controller
    tag: v0.23.1
    pullPolicy: IfNotPresent
  podSecurityContext:
    enabled: false
  containerSecurityContext:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi