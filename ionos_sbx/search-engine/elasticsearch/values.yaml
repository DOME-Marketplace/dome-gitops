elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch
  imageTag: "8.5.1"

  replicas: 1
  clusterHealthCheckParams: "wait_for_status=yellow&timeout=60s"

  protocol: https
  httpPort: 9200
     
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: "30Gi"

  readinessProbe:
    failureThreshold: 4
    initialDelaySeconds: 90
    periodSeconds: 10
    successThreshold: 3
    timeoutSeconds: 5  

  esConfig:
    elasticsearch.yml: |
      network.host: 0.0.0.0
      discovery.type: single-node
      xpack.security.enabled: true

  createCert: true

  secret:
    enabled: true
    password: dome_2024!

  extraEnvs:
    - name: cluster.initial_master_nodes
      value: ""
