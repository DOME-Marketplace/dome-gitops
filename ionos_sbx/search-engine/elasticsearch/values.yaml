elasticsearch:
  image: "docker.elastic.co/elasticsearch/elasticsearch"
  imageTag: "8.5.1"
  imagePullPolicy: "IfNotPresent"

  replicas: 1
  clusterHealthCheckParams: ""

  protocol: http
  httpPort: 9200

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  networkHost: "0.0.0.0"

  volumeClaimTemplate:
    metadata:
      name: elasticsearch-volume
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: "5Gi"

  readinessProbe: 
    failureThreshold: 10
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 5

  extraEnvs:
    - name: cluster.name
      value: elasticsearch
    - name: xpack.security.http.ssl.enabled
      value: "false"    
    - name: xpack.searchable.snapshot.cache.enabled
      value: "false"
    - name: discovery.type
      value: single-node
    - name: xpack.ml.enabled
      value: "false"
    - name: ELASTIC_USERNAME
      value: elastic
    - name: ELASTIC_PASSWORD
      value: dome_2024!