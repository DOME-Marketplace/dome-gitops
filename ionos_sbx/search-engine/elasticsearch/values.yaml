elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch
  imageTag: "8.5.1"

  replicas: 1
  clusterHealthCheckParams: "wait_for_status=yellow&timeout=60s"
  minimumMasterNodes: 1

  protocol: https
  httpPort: 9200
     
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: "5Gi"

  readinessProbe:
    failureThreshold: 4
    initialDelaySeconds: 90
    periodSeconds: 10
    successThreshold: 3
    timeoutSeconds: 5  
  
  networkHost: "0.0.0.0"

  esConfig:
    elasticsearch.yml: |
      network.host: 0.0.0.0
      xpack.security.http.ssl.enabled: true
      xpack.security.transport.ssl.enabled: true

  secret:
    enabled: true
    password: dome_2024!

