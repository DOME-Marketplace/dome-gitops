apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-proxy
  labels: { app: caddy-proxy }
spec:
  replicas: 1                       # 1 replica => 1 IP sorgente in uscita
  selector:
    matchLabels: { app: caddy-proxy }
  template:
    metadata:
      labels: { app: caddy-proxy }
    spec:
      nodeSelector:
        nodepool: ingress
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: caddy
          image: ghcr.io/dome-marketplace/caddy-forwardproxy:2.11.4
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          ports:
            - { name: forward, containerPort: 8080 }
          envFrom:
            - secretRef: { name: caddy-forward-auth }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: data,   mountPath: /data }
            - { name: config-store, mountPath: /config }
          readinessProbe: { tcpSocket: { port: 8080 }, initialDelaySeconds: 5,  periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 8080 }, initialDelaySeconds: 10, periodSeconds: 15 }
      volumes:
        - name: data
          emptyDir: {}
        - name: config-store
          emptyDir: {}