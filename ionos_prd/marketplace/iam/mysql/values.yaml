mysql:
  namespace: til
  fullnameOverride: mysql-til
  image:
    repository: bitnamilegacy/mysql
    tag: 8.0.31-debian-11-r10
  auth:
    existingSecret: mysql-secret
  initdbScripts:
    create.sql: |
      CREATE DATABASE til;
      CREATE DATABASE ccs;
      
  primary:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - mongodb
                      - scorpio
              namespaces:
                - marketplace
              topologyKey: kubernetes.io/hostname
    podAnnotations:
      backup.velero.io/backup-volumes: data

  labels:
    app.kubernetes.io/name: mysql-til    