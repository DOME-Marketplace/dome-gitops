trusted-issuers-list:

  # Image
  deployment:
    image:
      tag: 0.2.0
    # Resources (chart expects deployment.resources, not top-level resources)
    resources:
      requests:
        cpu: "50m"
        memory: "384Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

  # Configure an Ingress or OpenShift Route
  ingress:
    til:
      enabled: false
    tir:
      enabled: false
  route:
    til:
      enabled: false
    tir:
      enabled: false
      
  # Database config
  database:
    persistence: true
    host: mysql-til
    name: til

    existingSecret:
      enabled: true
      name:  mysql-secret
      key: mysql-root-password

    username: root