keycloak:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: primary
            namespaces:
              - cs-identity
            topologyKey: kubernetes.io/hostname
  image:
    repository: bitnamilegacy/keycloak
    tag: 24.0.4-debian-12-r1

  service:
    type: ClusterIP
  logging:
    level: INFO
  replicaCount: 1
  auth:
    existingSecret: keycloak-secret
    passwordSecretKey: keycloak-admin
    adminUser: csAdmin
  serviceAccount:
    create: true

  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: cs-identity.dome-marketplace.eu
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prd-issuer
    tls: true
    # Legacy hostnames previously served by the orphan cs-identity-keycloak-2
    # ingress. Keeping them here so all hostnames remain routable after the
    # orphan is removed.
    extraHosts:
      - name: cs-identity.dome-marketplace-prd.org
        path: /
      - name: cs-identity.dome-marketplace.org
        path: /
      - name: cs-identity.yumket.eu
        path: /
    extraTls:
      - hosts:
          - cs-identity.dome-marketplace-prd.org
          - cs-identity.dome-marketplace.org
          - cs-identity.yumket.eu
        secretName: cs-identity-legacy-tls
    
  extraEnvVars:
    - name: KEYCLOAK_PROXY_ADDRESS_FORWARDING
      value: "true"
    - name: KC_HOSTNAME_ADMIN_URL
      value: https://cs-identity.dome-marketplace.eu
    - name: KC_HOSTNAME_URL
      value: https://cs-identity.dome-marketplace.eu
    - name: KEYCLOAK_LOG_LEVEL
      value: INFO
  
  postgresql:
    image:
      repository: bitnamilegacy/postgresql
      tag: 16.3.0-debian-12-r8
    enabled: true
    auth:
      database: keycloak
      existingSecret: keycloak-secret

    # pod annontation for Velero backup
    primary:
      podAnnotations:
        backup.velero.io/backup-volumes: data